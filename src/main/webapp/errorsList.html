<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>受注未登録エラー一覧 - 検証用</title>

<link rel="stylesheet" href="css/jsuites.min.css" type="text/css" />
<link rel="stylesheet" href="css/jspreadsheet.min.css" type="text/css" />
<script src="js/jsuites.min.js"></script>
<script src="js/jspreadsheet.min.js"></script>

<style>
    body { font-family: "Meiryo", sans-serif; padding: 20px; background-color: #f5f5f5; }
    .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    h2 { border-left: 5px solid #007bff; padding-left: 15px; margin-bottom: 20px; }
    
    .controls { margin-bottom: 15px; }
    button { padding: 8px 18px; cursor: pointer; border: 1px solid #999; background: #f0f0f0; border-radius: 4px; font-weight: bold; }
    
    .tabs { display: flex; margin-top: 20px; }
    .tab { padding: 10px 25px; border: 1px solid #ccc; background: #e9e9e9; cursor: pointer; border-radius: 5px 5px 0 0; margin-right: 2px; }
    .tab.active { background: white; border-bottom: 2px solid white; font-weight: bold; }

    #errorList { margin-top: 15px; color: #d9534f; font-weight: bold; padding: 10px; border: 1px dashed #d9534f; background: #fff5f5; }
    
    #editArea { 
        margin-top: 20px; padding: 20px; border: 2px solid #007bff; 
        background-color: #f0f7ff; border-radius: 8px; display: none;
    }
</style>
</head>
<body>

<div class="container">
    <h2>受注未登録のエラー一覧</h2>

    <div class="controls">
        <button onclick="openEditModal()">項目訂正</button>
        <button onclick="checkData()">再チェック</button>
        <button onclick="saveToValidSheet()" style="background-color: #ffc107;">保存（正常データへ移動）</button>
    </div>

    <div class="tabs">
        <div id="tab-err" class="tab active" onclick="switchTab('err')">エラー一覧</div>
        <div id="tab-valid" class="tab" onclick="switchTab('valid')">正常データ</div>
    </div>

    <div id="spreadsheet"></div>
    <div id="valid-spreadsheet" style="display:none;"></div>
    
    <div id="errorList"></div>

    <div id="editArea">
        <h3>■ 項目訂正画面</h3>
        <div id="editSheet"></div>
        <div style="margin-top: 15px;">
            <button onclick="applyEdit()" style="background-color: #28a745; color: white; border:none;">反映</button>
            <button onclick="closeEditArea()">キャンセル</button>
        </div>
    </div>
</div>

<script>
const COL = { CHECK: 0, DATE: 1, NO: 2, ORDER: 3, DELIVERY: 4, MACHINE: 5, MATERIAL: 6, ITEM: 7, QTY: 8, PRICE: 9, RECEPTION: 10, STATUS: 11, ERROR: 12 };
const itemMaster = ["A001", "A002", "A003"];
let mainSheet, validSheet, editSheet;
let selectedRowIndex = null;

// ページ読み込み完了後に実行
window.onload = function() {
    // 1. エラー一覧
    mainSheet = jspreadsheet(document.getElementById('spreadsheet'), {
        data: [
            [false,'2026/04/05','E7397','G001','2026/04/20','HT-F405B-CHB8','2014985','A999', 0, -100, '2026/04/05', '修理案件／項目訂正', ''],
            [false,'2026/04/06','P5465','G002','2026/04/21','H-65A3-5','2006819','A001', 0, -10, '2026/04/06', '修理案件／項目訂正', '']
        ],
        columns: [
            { type:'checkbox', title:'訂正', width:50 },
            { type:'text', title:'登録日', width:100 },
            { type:'text', title:'整理No', width:80 },
            { type:'text', title:'注番', width:80 },
            { type:'text', title:'納期', width:100 },
            { type:'text', title:'適用機器名', width:150 },
            { type:'text', title:'品名CD', width:80 },
            { type:'text', title:'図番・品番', width:100 },
            { type:'numeric', title:'手配数', width:70 },
            { type:'numeric', title:'発注単価', width:80 },
            { type:'text', title:'受付日', width:100 },
            { type:'text', title:'保守部品形名', width:180 }, 
            { type:'text', title:'エラー理由', width:200, readOnly: true }
        ]
    });

    // 2. 正常データ
    validSheet = jspreadsheet(document.getElementById('valid-spreadsheet'), {
        data: [],
        columns: [
            { type:'text', title:'登録日', width:100 }, { type:'text', title:'整理No', width:80 },
            { type:'text', title:'注番', width:80 }, { type:'text', title:'納期', width:100 },
            { type:'text', title:'適用機器名', width:150 }, { type:'text', title:'品名CD', width:80 },
            { type:'text', title:'図番・品番', width:100 }, { type:'numeric', title:'手配数', width:70 },
            { type:'numeric', title:'発注単価', width:80 }, { type:'text', title:'受付日', width:100 },
            { type:'text', title:'保守部品形名', width:180 }
        ]
    });

    // 3. 訂正画面用
    editSheet = jspreadsheet(document.getElementById('editSheet'), {
        columns: [
            { type: 'text', title: '登録日', width: 100 }, { type: 'text', title: '整理No', readOnly:true, width: 80 },
            { type: 'text', title: '注番', readOnly:true, width: 80 }, { type: 'text', title: '納期', width: 100 },
            { type: 'text', title: '適用機器名', width: 150 }, { type: 'text', title: '品目CD', width: 80 },
            { type: 'text', title: '図番・品番', width: 100 }, { type: 'numeric', title: '手配数', width: 80 },
            { type: 'numeric', title: '発注単価', width: 80 }, { type: 'text', title: '受付日', width: 100 }
        ]
    });

    checkData();
};

function switchTab(type) {
    if(type === 'err') {
        document.getElementById('spreadsheet').style.display = 'block';
        document.getElementById('valid-spreadsheet').style.display = 'none';
        document.getElementById('tab-err').classList.add('active');
        document.getElementById('tab-valid').classList.remove('active');
    } else {
        document.getElementById('spreadsheet').style.display = 'none';
        document.getElementById('valid-spreadsheet').style.display = 'block';
        document.getElementById('tab-err').classList.remove('active');
        document.getElementById('tab-valid').classList.add('active');
    }
}

function checkData() {
    const data = mainSheet.getData();
    let msgs = [];
    for(let i=0; i<data.length; i++) {
        let errs = [];
        const item = data[i][COL.ITEM];
        const qty = parseFloat(data[i][COL.QTY]);
        const price = parseFloat(data[i][COL.PRICE]);

        // スタイルリセット
        [COL.ITEM, COL.QTY, COL.PRICE].forEach(c => {
            const cell = jspreadsheet.helpers.getColumnNameFromId([c, i]);
            mainSheet.setStyle(cell, 'background-color', '');
            mainSheet.setStyle(cell, 'color', '');
        });

        if(!itemMaster.includes(item)) {
            errs.push("図品番エラー");
            const cell = jspreadsheet.helpers.getColumnNameFromId([COL.ITEM, i]);
            mainSheet.setStyle(cell, 'background-color', '#ffcccc');
            mainSheet.setStyle(cell, 'color', 'red');
        }
        if(isNaN(qty) || qty <= 0) {
            errs.push("数量エラー");
            const cell = jspreadsheet.helpers.getColumnNameFromId([COL.QTY, i]);
            mainSheet.setStyle(cell, 'background-color', '#ffcccc');
            mainSheet.setStyle(cell, 'color', 'red');
        }
        if(isNaN(price) || price <= 0) {
            errs.push("単価エラー");
            const cell = jspreadsheet.helpers.getColumnNameFromId([COL.PRICE, i]);
            mainSheet.setStyle(cell, 'background-color', '#ffcccc');
            mainSheet.setStyle(cell, 'color', 'red');
        }

        const msg = errs.join("、");
        mainSheet.setValueFromCoords(COL.ERROR, i, msg);
        if(msg) msgs.push(`${i+1}行目：${msg}`);
    }
    document.getElementById('errorList').innerHTML = msgs.length ? msgs.join("<br>") : "エラーなし（保存可能です）";
}

function openEditModal() {
    const data = mainSheet.getData();
    let selected = [];
    for(let i=0; i<data.length; i++) {
        if(mainSheet.getValueFromCoords(COL.CHECK, i)) selected.push(i);
    }
    if(selected.length !== 1) { alert("1件チェックしてください。"); return; }
    selectedRowIndex = selected[0];
    editSheet.setData([data[selectedRowIndex].slice(1, 11)]);
    document.getElementById("editArea").style.display = "block";
}

function applyEdit() {
    const data = editSheet.getData()[0];
    // 訂正画面内チェック
    if(!itemMaster.includes(data[6]) || parseFloat(data[7]) <= 0 || parseFloat(data[8]) <= 0) {
        alert("入力不備があります。正しい値を入力してください。");
        return;
    }
    for(let i=0; i<data.length; i++) mainSheet.setValueFromCoords(i+1, selectedRowIndex, data[i]);
    mainSheet.setValueFromCoords(COL.STATUS, selectedRowIndex, "訂正済み");
    mainSheet.setValueFromCoords(COL.CHECK, selectedRowIndex, false);
    document.getElementById("editArea").style.display = "none";
    checkData();
}

function closeEditArea() { document.getElementById("editArea").style.display = "none"; }

function saveToValidSheet() {
    const data = mainSheet.getData();
    let move = [], stay = [];
    for(let i=0; i<data.length; i++) {
        const isChecked = mainSheet.getValueFromCoords(COL.CHECK, i);
        const hasErr = mainSheet.getValueFromCoords(COL.ERROR, i);
        if(isChecked && !hasErr) move.push(data[i].slice(1, 12));
        else if(isChecked && hasErr) { alert(`${i+1}行目のエラーを訂正してください。`); return; }
        else stay.push(data[i]);
    }
    if(move.length === 0) { alert("保存対象がありません。"); return; }
    validSheet.setData([...validSheet.getData(), ...move]);
    mainSheet.setData(stay);
    alert("保存完了！「正常データ」タブへ移動しました。");
    checkData();
}
</script>
</body>
</html>
