<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>受注未登録エラー一覧 - 検証用</title>

<link rel="stylesheet" href="css/jsuites.min.css" />
<link rel="stylesheet" href="css/jspreadsheet.min.css" />
<script src="js/jsuites.min.js"></script>
<script src="js/jspreadsheet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body {
    font-family: "Meiryo", sans-serif;
    padding: 20px;
}
button {
    margin: 10px 5px 10px 0;
    padding: 8px 15px;
    cursor: pointer;
}
#errorList {
    margin-top: 10px;
    color: red;
    font-weight: bold;
}
#editArea {
    margin-top: 20px;
    padding: 15px;
    border: 2px solid #007bff;
    background-color: #f8f9fa;
    border-radius: 4px;
    display: none;
}
</style>
</head>

<body>

<h2>受注未登録のエラー一覧</h2>

<div class="controls">
    <button onclick="openEditModal()">項目訂正</button>
    <button onclick="saveToValidSheet()" style="background-color:#ffc107;">
        保存（正常データへ移動）
    </button>

    <input type="file" id="csvFile" accept=".csv" style="display:none" onchange="importCSV()">
    <button onclick="document.getElementById('csvFile').click()">CSV取込</button>
    <button onclick="exportExcel()">Excel出力</button>
</div>

<div id="spreadsheet"></div>
<div id="errorList"></div>

<div id="editArea">
    <h3>項目訂正画面</h3>
    <div id="editSheet"></div>
    <br>
    <button onclick="applyEdit()" style="background-color:#28a745;color:white;">反映</button>
    <button onclick="closeEditArea()">キャンセル</button>
</div>

<script>
// =============================
// 列定義
// =============================
const COL = {
    CHECK: 0, DATE: 1, NO: 2, ORDER: 3, DELIVERY: 4,
    MACHINE: 5, MATERIAL: 6, ITEM: 7, QTY: 8, PRICE: 9,
    RECEPTION: 10, STATUS: 11, ERROR: 12
};

let itemMaster = [];
let orderData = [];
let selectedRowIndex = null;

// =============================
// マスタデータ読込
// =============================
async function loadItemMaster() {
    const response = await fetch("./data/itemMaster.json");
    const data = await response.json();
    itemMaster = data.items;
}

async function loadOrderData() {
    const response = await fetch("./data/orderData.json");
    const data = await response.json();
    orderData = data.orderdatas;
}

// =============================
// メインシート初期化
// =============================
const spreadsheet = jspreadsheet(document.getElementById('spreadsheet'), {
    worksheets: [
        {
            worksheetName: "エラー一覧",
            data: [],
            columns: [
                { type:'checkbox', title:'訂正', width:50 },
                { type:'text', title:'登録日', width:100 },
                { type:'text', title:'整理No', width:80 },
                { type:'text', title:'注番', width:80 },
                { type:'text', title:'納期', width:100 },
                { type:'text', title:'適用機器名', width:150 },
                { type:'text', title:'品名CD', width:80 },
                { type:'text', title:'図番・品番', width:100 },
                { type:'numeric', title:'手配数', width:80 },
                { type:'numeric', title:'発注単価', width:100 },
                { type:'text', title:'受付日', width:100 },
                { type:'text', title:'ステータス', width:150 },
                { type:'text', title:'エラー理由', width:200, readOnly:true }
            ],
            onchange: function(instance, cell, x, y, value) {
                if (x === COL.MACHINE && (value === "D" || value === "d")) {
                    const result = confirm(
                        "適用機器名に「D」が設定されました。\n" +
                        "削除フラグを設定すると解除できません。\n\n" +
                        "この案件を削除しますか？"
                    );

                    if (result) {
                        instance.deleteRow(y);
                        alert("案件を削除しました。");
                    } else {
                        instance.setValueFromCoords(x, y, "");
                    }
                }
                checkData();
            }
        },
        {
            worksheetName: "正常データ",
            data: [],
            columns: [
                { type:'text', title:'登録日' },
                { type:'text', title:'整理No' },
                { type:'text', title:'注番' },
                { type:'text', title:'納期' },
                { type:'text', title:'適用機器名' },
                { type:'text', title:'品名CD' },
                { type:'text', title:'図番・品番' },
                { type:'numeric', title:'手配数' },
                { type:'numeric', title:'発注単価' },
                { type:'text', title:'受付日' }
            ]
        }
    ]
});

// =============================
// 訂正シート
// =============================
const editSheet = jspreadsheet(document.getElementById('editSheet'), {
    worksheets: [{
        data: [],
        columns: [
            { type:'text', title:'登録日' },
            { type:'text', title:'整理No', readOnly:true },
            { type:'text', title:'注番', readOnly:true },
            { type:'text', title:'納期' },
            { type:'text', title:'適用機器名' },
            { type:'text', title:'品名CD' },
            { type:'text', title:'図番・品番' },
            { type:'numeric', title:'手配数' },
            { type:'numeric', title:'発注単価' },
            { type:'text', title:'受付日' }
        ]
    }]
});

// =============================
// 初期化処理
// =============================
async function initializeSystem() {
    await loadItemMaster();
    await loadOrderData();
    spreadsheet[0].setData(orderData);
    checkData();
}

window.onload = initializeSystem;

// =============================
// 項目訂正
// =============================
function openEditModal() {
    const sheet = spreadsheet[0];
    const data = sheet.getData();
    let selected = [];

    for (let i = 0; i < data.length; i++) {
        if (sheet.getValueFromCoords(COL.CHECK, i)) {
            selected.push(i);
        }
    }

    if (selected.length !== 1) {
        alert("訂正する行を1件だけ選択してください。");
        return;
    }

    selectedRowIndex = selected[0];
    const rowData = data[selectedRowIndex].slice(1, 11);
    editSheet[0].setData([rowData]);
    document.getElementById("editArea").style.display = "block";
}

function applyEdit() {
    const mainSheet = spreadsheet[0];
    const edited = editSheet[0].getData()[0];

    if (!itemMaster.includes(edited[6])) {
        alert("図番・品番がマスタに存在しません。");
        return;
    }

    if (edited[7] <= 0 || edited[8] <= 0) {
        alert("数量および単価を正しく入力してください。");
        return;
    }

    for (let i = 0; i < edited.length; i++) {
        mainSheet.setValueFromCoords(i + 1, selectedRowIndex, edited[i]);
    }

    mainSheet.setValueFromCoords(COL.STATUS, selectedRowIndex, "訂正済み");
    mainSheet.setValueFromCoords(COL.CHECK, selectedRowIndex, false);

    closeEditArea();
    checkData();
}

function closeEditArea() {
    document.getElementById("editArea").style.display = "none";
    selectedRowIndex = null;
}

// =============================
// エラーチェック
// =============================
function checkData() {
    const sheet = spreadsheet[0];
    const data = sheet.getData();
    let messages = [];

    for (let i = 0; i < data.length; i++) {
        let errors = [];
        const item = data[i][COL.ITEM];
        const qty = parseFloat(data[i][COL.QTY]);
        const price = parseFloat(data[i][COL.PRICE]);

        if (!itemMaster.includes(item)) errors.push("図品番エラー");
        if (isNaN(qty) || qty <= 0) errors.push("数量エラー");
        if (isNaN(price) || price <= 0) errors.push("単価エラー");

        const errMsg = errors.join("、");
        sheet.setValueFromCoords(COL.ERROR, i, errMsg);

        if (errMsg) {
            messages.push(`${i + 1}行目：${errMsg}`);
        }
    }

    document.getElementById("errorList").innerHTML =
        messages.length ? messages.join("<br>") : "エラーなし";
}

// =============================
// 正常データ保存
// =============================
function saveToValidSheet() {
    const errSheet = spreadsheet[0];
    const validSheet = spreadsheet[1];
    const data = errSheet.getData();

    let rowsToMove = [];
    let rowsToStay = [];

    for (let i = 0; i < data.length; i++) {
        const isChecked = errSheet.getValueFromCoords(COL.CHECK, i);
        const status = errSheet.getValueFromCoords(COL.STATUS, i);
        const errMsg = errSheet.getValueFromCoords(COL.ERROR, i);

        if (isChecked) {
            if (errMsg !== "" || status !== "訂正済み") {
                alert(`${i + 1}行目：訂正が完了していません。`);
                return;
            }
            rowsToMove.push(data[i].slice(1, 11));
        } else {
            rowsToStay.push(data[i]);
        }
    }

    if (rowsToMove.length === 0) {
        alert("保存対象がありません。");
        return;
    }

    validSheet.setData([
        ...validSheet.getData(),
        ...rowsToMove
    ]);

    errSheet.setData(rowsToStay);
    alert("保存が完了しました。");
}

// =============================
// CSV取込
// =============================
function importCSV() {
    const file = document.getElementById("csvFile").files[0];
    const reader = new FileReader();

    reader.onload = function (e) {
        const rows = e.target.result.split("\n").map(r => r.split(","));
        const data = rows.slice(1).map(r => [
            false, r[0], r[1], r[2], r[3],
            r[4], r[5], r[6],
            Number(r[7]), Number(r[8]),
            r[9], "", ""
        ]);

        spreadsheet[0].setData(data);
        checkData();
    };

    reader.readAsText(file, "UTF-8");
}

// =============================
// Excel出力
// =============================
function exportExcel() {
    const data = spreadsheet[0].getData();
    const headers = [
        "訂正","登録日","整理No","注番","納期",
        "適用機器名","品名CD","図番・品番",
        "手配数","発注単価","受付日","ステータス","エラー理由"
    ];

    const ws = XLSX.utils.aoa_to_sheet([headers, ...data]);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "エラー一覧");
    XLSX.writeFile(wb, "受注未登録エラー一覧.xlsx");
}
</script>
</body>
</html>
