<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>受注未登録エラー一覧 - 検証用</title>

<link rel="stylesheet" href="css/jsuites.min.css" />
<link rel="stylesheet" href="css/jspreadsheet.min.css" />
<script src="js/jsuites.min.js"></script>
<script src="js/jspreadsheet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
    body { font-family: "Meiryo", sans-serif; padding: 20px; }
    button { margin: 10px 5px 10px 0; padding: 8px 15px; cursor: pointer; border: 1px solid #ccc; border-radius: 4px; }
    #errorList { margin-top: 10px; color: red; font-weight: bold; min-height: 1.2em; }
    #editArea {
        margin-top: 20px; padding: 15px; border: 2px solid #007bff;
        background-color: #f8f9fa; border-radius: 4px; display: none;
    }
    .controls { background: #eee; padding: 10px; border-radius: 4px; margin-bottom: 10px; }
    .jss_container { margin-top: 10px; }
</style>
</head>
<body>

<h2>受注未登録のエラー一覧</h2>

<div class="controls">
    <button onclick="openEditModal()">項目訂正</button>
    <button onclick="checkData(true)">再チェック</button>
    <button onclick="saveToValidSheet()" style="background-color: #ffc107;">保存（正常データへ移動）</button>
    <span style="margin-left: 20px;">
        <input type="file" id="csvFile" accept=".csv" style="display:none" onchange="importCSV()">
        <button onclick="document.getElementById('csvFile').click()">CSV取込</button>
        <button onclick="exportExcel()">Excel出力</button>
    </span>
</div>

<div id="spreadsheet"></div>
<div id="errorList"></div>

<div id="editArea">
    <h3>項目訂正画面</h3>
    <div id="editSheet"></div>
    <div style="margin-top: 15px;">
        <button onclick="applyEdit()" style="background-color: #28a745; color: white; border:none;">反映</button>
        <button onclick="closeEditArea()">キャンセル</button>
    </div>
</div>

<script>
const COL = {
    CHECK: 0, DATE: 1, NO: 2, ORDER: 3, DELIVERY: 4,
    MACHINE: 5, MATERIAL: 6, ITEM: 7, QTY: 8, PRICE: 9,
    RECEPTION: 10, STATUS: 11, ERROR: 12
};

const itemMaster = ["A001", "A002", "A003"];
let selectedRowIndex = null;

// メインスプレッドシート初期化
const spreadsheet = jspreadsheet(document.getElementById('spreadsheet'), {
    onchange: function(instance, cell, x, y, value) {
        // 適用機器名列（COL.MACHINE）が変更された場合
        if (x === COL.MACHINE && value === "D") {
            const confirmDelete = confirm(
                "適用機器名に「D」が設定されました。\n" +
                "削除フラグを設定すると、通常の処理では解除できません。\n\n" +
                "この案件を削除しますか？"
            );

            if (confirmDelete) {
                // 行削除
                instance.deleteRow(y);
                alert("案件を削除しました。");
            } else {
                // 入力を元に戻す
                instance.setValueFromCoords(x, y, "");
            }
        }
    },
    worksheets: [
        {
            worksheetName: "エラー一覧",
            data: [
                [false,'2026/04/05','E7397','G001','2026/04/20','HT-F405B-CHB8','2014985','A999', 0, -100, '2026/04/05', '修理案件／項目訂正', ''],
                [false,'2026/04/06','P5465','G002','2026/04/21','H-65A3-5','2006819','A001', 0, -10, '2026/04/06', '修理案件／項目訂正', '']
            ],
            columns: [
                { type:'checkbox', title:'訂正', width:50 },
                { type:'text', title:'登録日', width:100 },
                { type:'text', title:'整理No', width:80 },
                { type:'text', title:'注番', width:80 },
                { type:'text', title:'納期', width:100 },
                { type:'text', title:'適用機器名', width:150 },
                { type:'text', title:'品名CD', width:80 },
                { type:'text', title:'図番・品番', width:100 },
                { type:'numeric', title:'手配数', width:70 },
                { type:'numeric', title:'発注単価', width:80 },
                { type:'text', title:'受付日', width:100 },
                { type:'text', title:'保守部品形名', width:180 },
                { type:'text', title:'エラー理由', width:200, readOnly: true }
            ],
            onchange: function(instance, cell, x, y, value) {
                // 適用機器名(COL.MACHINE)に "D" が入力された場合の削除処理
                if (parseInt(x) === COL.MACHINE && (value === "D" || value === "ｄ")) {
                    processDeletion(instance, y);
                }
            },
            onbeforechange: function(instance, cell, x, y, value) {
                // 削除対象になった行は編集不可にする
                const status = instance.jspreadsheet.getValueFromCoords(COL.STATUS, y);
                if (status === "削除対象") return false;
            }
        },
        {
            worksheetName: "正常データ",
            data: [],
            columns: [
                { type:'text', title:'登録日', width:100 },
                { type:'text', title:'整理No', width:80 },
                { type:'text', title:'注番', width:80 },
                { type:'text', title:'納期', width:100 },
                { type:'text', title:'適用機器名', width:150 },
                { type:'text', title:'品名CD', width:80 },
                { type:'text', title:'図番・品番', width:100 },
                { type:'numeric', title:'手配数', width:70 },
                { type:'numeric', title:'発注単価', width:80 },
                { type:'text', title:'受付日', width:100 }
            ]
        }
    ]
});

// 訂正用シート初期化
const editSheet = jspreadsheet(document.getElementById('editSheet'), {
    worksheets: [{
        columns: [
            { type: 'text', title: '登録日', width: 100 },
            { type: 'text', title: '整理No', readOnly: true, width: 80 },
            { type: 'text', title: '注番', readOnly: true, width: 80 },
            { type: 'text', title: '納期', width: 100 },
            { type: 'text', title: '適用機器名', width: 150 },
            { type: 'text', title: '品目CD', width: 80 },
            { type: 'text', title: '図番・品番', width: 100 },
            { type: 'numeric', title: '手配数', width: 80 },
            { type: 'numeric', title: '発注単価', width: 80 },
            { type: 'text', title: '受付日', width: 100 }
        ]
    }]
});

/* 削除処理 (D入力時のダイアログ) */
function processDeletion(instance, rowIdx) {
    jSuites.confirm({
        title: '案件削除の確認',
        message: '適用機器名に "D" が設定されました。この案件を削除対象にしますか？<br>削除フラグを設定すると解除できません。',
        onconfirm: function() {
            instance.setValueFromCoords(COL.STATUS, rowIdx, "削除対象");
            instance.setValueFromCoords(COL.CHECK, rowIdx, false);
            // 行を目立たせる（グレーアウト）
            const range = jspreadsheet.helpers.getColumnNameFromId([0, rowIdx]) + ":" + jspreadsheet.helpers.getColumnNameFromId([COL.ERROR, rowIdx]);
            instance.setStyle(range, 'background-color', '#f0f0f0');
            instance.setStyle(range, 'color', '#999');
            checkData(false);
        },
        oncancel: function() {
            instance.setValueFromCoords(COL.MACHINE, rowIdx, ""); // Dを消す
        }
    });
}

function openEditModal() {
    const sheet = spreadsheet[0];
    const data = sheet.getData();
    let selected = [];
    for(let i=0; i<data.length; i++) {
        if(sheet.getValueFromCoords(COL.CHECK, i)) selected.push(i);
    }
    if(selected.length !== 1) {
        alert("訂正する行を1件だけ選択してください。");
        return;
    }
    // 削除対象の行は訂正不可
    if(sheet.getValueFromCoords(COL.STATUS, selected[0]) === "削除対象") {
        alert("削除対象の行は訂正できません。");
        return;
    }
    selectedRowIndex = selected[0];
    const rowData = data[selectedRowIndex].slice(1, 11);
    editSheet[0].setData([rowData]);
    document.getElementById("editArea").style.display = "block";
}

function applyEdit() {
    const mainSheet = spreadsheet[0];
    const editedData = editSheet[0].getData()[0];
    
    if (!itemMaster.includes(editedData[6]) || parseFloat(editedData[7]) <= 0 || parseFloat(editedData[8]) <= 0) {
        alert("入力内容に不備があります。数値を正しく入力してください。");
        return; 
    }

    for(let i=0; i<editedData.length; i++) {
        mainSheet.setValueFromCoords(i+1, selectedRowIndex, editedData[i]);
    }
    mainSheet.setValueFromCoords(COL.STATUS, selectedRowIndex, "訂正済み");
    mainSheet.setValueFromCoords(COL.CHECK, selectedRowIndex, false);
    
    closeEditArea();
    checkData(false);
    alert("反映しました。");
}

function closeEditArea() {
    document.getElementById("editArea").style.display = "none";
    selectedRowIndex = null;
}

function checkData(showAlert) {
    const sheet = spreadsheet[0];
    const data = sheet.getData();
    let msgs = [];
    
    for(let i=0; i<data.length; i++) {
        if(sheet.getValueFromCoords(COL.STATUS, i) === "削除対象") continue;

        let rowErrors = [];
        const item = data[i][COL.ITEM];
        const qty = parseFloat(data[i][COL.QTY]);
        const price = parseFloat(data[i][COL.PRICE]);

        [COL.ITEM, COL.QTY, COL.PRICE].forEach(c => {
            sheet.setStyle(jspreadsheet.helpers.getColumnNameFromId([c, i]), 'background-color', '');
            sheet.setStyle(jspreadsheet.helpers.getColumnNameFromId([c, i]), 'color', '');
        });

        if(!itemMaster.includes(item)) {
            rowErrors.push("図品番エラー");
            sheet.setStyle(jspreadsheet.helpers.getColumnNameFromId([COL.ITEM, i]), 'background-color', '#ffcccc');
            sheet.setStyle(jspreadsheet.helpers.getColumnNameFromId([COL.ITEM, i]), 'color', 'red');
        }
        if(isNaN(qty) || qty <= 0) {
            rowErrors.push("数量エラー");
            sheet.setStyle(jspreadsheet.helpers.getColumnNameFromId([COL.QTY, i]), 'background-color', '#ffcccc');
            sheet.setStyle(jspreadsheet.helpers.getColumnNameFromId([COL.QTY, i]), 'color', 'red');
        }
        if(isNaN(price) || price <= 0) {
            rowErrors.push("単価エラー");
            sheet.setStyle(jspreadsheet.helpers.getColumnNameFromId([COL.PRICE, i]), 'background-color', '#ffcccc');
            sheet.setStyle(jspreadsheet.helpers.getColumnNameFromId([COL.PRICE, i]), 'color', 'red');
        }

        const errMsg = rowErrors.join("、");
        sheet.setValueFromCoords(COL.ERROR, i, errMsg);
        if(errMsg) msgs.push(`${i+1}行目：${errMsg}`);
    }

    if(showAlert) alert(msgs.length ? "【エラー】\n" + msgs.join("\n") : "エラーはありません。");
    document.getElementById("errorList").innerHTML = msgs.length ? msgs.join("<br>") : "エラーなし";
}

function saveToValidSheet() {
    const errSheet = spreadsheet[0];
    const validSheet = spreadsheet[1];
    const data = errSheet.getData();
    
    let rowsToStay = [];
    let rowsToMove = [];

    for(let i=0; i<data.length; i++) {
        const isChecked = errSheet.getValueFromCoords(COL.CHECK, i);
        const status = errSheet.getValueFromCoords(COL.STATUS, i);
        const errMsg = errSheet.getValueFromCoords(COL.ERROR, i);

        if(isChecked) {
            if(status === "削除対象") {
                alert("削除対象の行は正常データへ保存できません。");
                return;
            }
            if(errMsg || status !== "訂正済み") {
                alert(`${i+1}行目を訂正してください。`);
                return;
            }
            rowsToMove.push(data[i].slice(1, 11)); 
        } else {
            rowsToStay.push(data[i]);
        }
    }

    if(rowsToMove.length === 0) {
        alert("保存対象がありません。");
        return;
    }

    if(confirm(rowsToMove.length + "件保存しますか？")) {
        validSheet.setData([...validSheet.getData(), ...rowsToMove].filter(r => r[0] !== ""));
        errSheet.setData(rowsToStay);
        alert("完了しました。");
        checkData(false);
    }
}

function importCSV() {
    const file = document.getElementById("csvFile").files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function (e) {
        const rows = e.target.result.trim().split("\n").map(row => row.split(","));
        const data = rows.slice(1).map(row => [false, row[0], row[1], row[2], row[3], row[4], row[5], row[6], Number(row[7]), Number(row[8]), row[9], "", ""]);
        spreadsheet[0].setData(data);
        checkData(false);
    };
    reader.readAsText(file, "UTF-8");
}

function exportExcel() {
    const data = spreadsheet[0].getData();
    const headers = ["訂正", "登録日", "整理No", "注番", "納期", "適用機器名", "品名CD", "図番・品番", "手配数", "発注単価", "受付日", "保守部品形名", "エラー理由"];
    const ws = XLSX.utils.aoa_to_sheet([headers, ...data]);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Sheet1");
    XLSX.writeFile(wb, "export.xlsx");
}

window.onload = () => checkData(false);
</script>
</body>
</html>
